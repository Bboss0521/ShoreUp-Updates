<h2>Noetira 1.0.15</h2>
<ul>
<li>本地初筛仅在完成并确认个人条件后启用，避免默认资料造成误判。</li>
<li>专业代码、目录层级、学历、学位、性别、政治面貌、应届身份等关键资料必须完整；公告缺少字段不再视为“不限”。</li>
<li>专业判断优先使用目录代码与层级；公告描述无法可靠映射时标记为“需确认”，不再把模糊原始文本当作硬性限制。</li>
<li>岗位页不再在每次进入时自动重跑初筛；初筛结果写入本地缓存，重进页面直接复用，显著降低导入两万余岗位后的卡顿。</li>
<li>补充“机关（单位）代码”等部门代码表头别名，减少不同公告格式导致的岗位合并丢失。</li>
</ul>
<p>本地初筛仅供辅助，最终以招录机关资格审查为准。</p>
