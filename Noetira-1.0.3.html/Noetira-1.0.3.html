  <title>Noetira 1.0.3 更新说明</title>

<body>
  <h2>Noetira 1.0.3</h2>
  <ul>
    <li>重构“AI 查公告”，仅保留近 7 天的招考信息，并标注政府官网、高校官网或招考线索。</li>
    <li>新增关注城市每日自动监测，覆盖公务员、选调生、三支一扶、事业单位和公开遴选。</li>
    <li>发现新公告时发送 macOS 通知，并在岗位页面保留最近检查状态与公告列表。</li>
    <li>错题复盘和重新作答完成后，可直接查看已有 AI 解析并继续追问。</li>
  </ul>
  <p>首次开启每日监测会建立公告基线；完全退出应用后，将在下次启动时补查。更新不会清除已有学习数据。</p>
</body>
