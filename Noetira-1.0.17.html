<h2>Noetira 1.0.17</h2>
<ul>
<li>修复大职位表导入成功后返回岗位模块时，岗位模型跨线程访问可能引发的 CPU 持续占用、无响应和闪退。</li>
<li>岗位首页统计改为数据库计数查询，不再为统计逐条解码全部岗位原始字段。</li>
<li>本地初筛改为低优先级小批次增量处理，可显示进度并支持停止；离开岗位模块会停止当前任务。</li>
<li>个人条件发生变化时，返回岗位模块会要求确认是否重新初筛；暂不处理的岗位明确显示为待按当前条件初筛，旧结论不会被当作当前结论。</li>
<li>新增本地批次摘要缓存，岗位首页和翻页不会被批次统计阻塞。</li>
</ul>
<p>本地初筛和 AI 核验仅供辅助，最终以招录机关资格审查为准。</p>
